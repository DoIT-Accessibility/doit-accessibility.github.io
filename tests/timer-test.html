<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Timer Test</title>
	<style>
		body { font-family: system-ui, sans-serif; }
	</style>
</head>
<body>
	<main>
		<h1>Timer Test</h1>
		<div>
			<div>
				<div><p>Pre-zero above</p></div>
				<div role="timer" aria-atomic="true"><span class="timer-days">-</span> days : <span class="timer-hours">-</span> hours : <span class="timer-minutes">-</span> minutes</div>
				<div><p>Pre-zero below</p></div>
			</div>
			<div hidden>
				<div><p>Post-zero above</p></div>
				<div role="timer" aria-atomic="true"><span class="timer-days">-</span> days : <span class="timer-hours">-</span> hours : <span class="timer-minutes">-</span> minutes</div>
				<div><p>Post-zero below</p></div>
			</div>
		</div>
	</main>
	<script>
		document.querySelectorAll("[role='timer']").forEach(timer => {
			timer.days = timer.querySelector(".timer-days");
			timer.hours = timer.querySelector(".timer-hours");
			timer.minutes = timer.querySelector(".timer-minutes");
			let time = 5;
			setInterval(() => {
				time--;
				timer.days.textContent = Math.trunc(time / (60 * 24));
				timer.hours.textContent = Math.trunc((time / 60) % 24);
				timer.minutes.textContent = (time % 60);
				if (time == 0) { 
					timer.parentElement.toggleAttribute("hidden");
					timer.parentElement.setAttribute("role", "alert");
					setTimeout(() => { timer.parentElement.removeAttribute("role"); }, 999);
				}
			}, 1000);
		});
	</script>
</body>
</html>
