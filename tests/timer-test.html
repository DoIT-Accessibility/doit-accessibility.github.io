<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Timer Test</title>
	<style>
		body { font-family: system-ui, sans-serif; }
	</style>
</head>
<body>
	<main>
		<h1>Timer Test</h1>
		<div>
			<div>
				<div role="status">
					<div><p>Pre above</p></div>
					<div hidden><p>Post above</p></div>
				</div>
				<div role="timer" aria-atomic="true"><span class="timer-days">-</span> days : <span class="timer-hours">-</span> hours : <span class="timer-minutes">-</span> minutes</div>
				<div role="status">
					<div><p>Pre below</p></div>
					<div hidden><p>Post below</p></div>
				</div>
			</div>
			<!--
			<div hidden>
				<div role="status" aria-live="polite"><p>Post-zero above</p></div>
				<div role="timer" aria-atomic="true"><span class="timer-days">-</span> days : <span class="timer-hours">-</span> hours : <span class="timer-minutes">-</span> minutes</div>
				<div role="status" aria-live="polite"><p>Post-zero below</p></div>
			</div>
			-->
		</div>
	</main>
	<script>
		document.querySelectorAll("[role='timer']").forEach(timer => {
			timer.days = timer.querySelector(".timer-days");
			timer.hours = timer.querySelector(".timer-hours");
			timer.minutes = timer.querySelector(".timer-minutes");
			let time = 5;
			setInterval(() => {
				time--;
				timer.days.textContent = Math.trunc(time / (60 * 24));
				timer.hours.textContent = Math.trunc((time / 60) % 24);
				timer.minutes.textContent = (time % 60);
				if (time == 0) { 
					//timer.parentElement.toggleAttribute("hidden");
					timer.parentElement.querySelectorAll(["[role='status']"]).forEach(status => status.querySelectorAll("div").forEach(div => div.toggleAttribute("hidden")));
				}
			}, 1000);
		});
	</script>
</body>
</html>
