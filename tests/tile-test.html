<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="../site.css">
	<title>Tile Test</title>
	<style>
		.tile { display: inline-block; margin: 1em; padding: 1em; border: 1px solid #777; border-radius: .5em; cursor: pointer; }
	</style>
</head>
<body>
	<header></header>
	<main>
		<h1>Tile Test</h1>
		<section>
			<h2>Test 1: ARIA Label</h2>
			<div class="tile" role="button" aria-label="ARIA Label" tabindex="0">
				<div>Content</div>
			</div>
		</section>
		<section>
			<h2>Test 2: ARIA Label &amp; Description</h2>
			<div class="tile" role="button" aria-label="ARIA Label" aria-describedby="description" tabindex="0">
				<div>Content</div>
				<div id="description">ARIA Description</div>
			</div>
		</section>
	</main>
	<footer><a href=".."><span>Home</span></a> Last Updated: 2025-06-25</footer>
</body>
</html>
