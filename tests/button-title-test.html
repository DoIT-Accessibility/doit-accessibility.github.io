<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="../site.css">
	<title>Button Title Test</title>
</head>
<body>
	<header></header>
	<main>
		<h1>Button Title Test</h1>
		<section>
			<h2>Test 1: Title</h2>
			<p>
				<input type="button" value="Edit" title="Edit Something">
				<button title="Edit Something">Edit</button>
			</p>
		</section>
		<section>
			<h2>Test 2: ARIA-Label</h2>
			<p>
				<input type="button" value="Edit" aria-label="Edit Something">
				<button aria-label="Edit Something">Edit</button>
			</p>
		</section>
		<section>
			<h2>Test 3: Title &amp; ARIA-Label</h2>
			<p>
				<input type="button" value="Edit" title="Edit Something" aria-label="Edit Something">
				<button title="Edit Something" aria-label="Edit Something">Edit</button>
			</p>
		</section>
	</main>
	<footer><a href=".."><span>Home</span></a> Last Updated: 2025-06-24</footer>
</body>
</html>
